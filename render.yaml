services:
  # ── Backend: Express + Socket.io ──────────────────────────────────────────
  - type: web
    name: chatme-server
    env: node
    region: singapore
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false     # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_CALLBACK_URL
        sync: false     # https://chatme-server.onrender.com/auth/github/callback
      - key: ADMIN_GITHUB_USERNAME
        value: ms584
      - key: CLIENT_URL
        sync: false     # https://chatme-client.onrender.com

  # ── Frontend: React (Vite) ────────────────────────────────────────────────
  - type: web
    name: chatme-client
    env: static
    region: singapore
    plan: free
    rootDir: client
    buildCommand: npm install; npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false     # https://chatme-server.onrender.com
      - key: VITE_SOCKET_URL
        sync: false     # https://chatme-server.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html     # SPA fallback for React Router
